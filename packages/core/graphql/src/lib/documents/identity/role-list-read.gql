query RoleListRead($input: IIoRestorecommerceResourcebaseReadRequest!) {
  identity {
    role {
      Read(input: $input) {
        details {
          items {
            payload {
              id
              name
              description
            }
            status {
              code
              message
            }
          }
          operationStatus {
            code
            message
          }
        }
      }
    }
  }
}
