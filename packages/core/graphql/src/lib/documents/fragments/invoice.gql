fragment InvoiceFragment on IoRestorecommerceInvoiceInvoice {
  id
  invoiceNumber
  customer {
    id
    name
  }
  shop {
    id
    name
  }
  paymentState
  sent
  withdrawn
  fromDate
  toDate
  customerOrderNumber
  customerVatId
  references {
    instanceId
    instanceType
  }

  paymentHints

  sender {
    address {
      id
      buildingNumber
      street
      locality
      region
      countryId
    }
    contact {
      name
      email
      phone
    }
    comments
  }

  recipient {
    address {
      id
      buildingNumber
      street
      locality
      region
      countryId
    }
    contact {
      name
      email
      phone
    }
    comments
  }

  billingAddress {
    address {
      id
      buildingNumber
      street
      locality
      region
      countryId
    }
    contact {
      name
      email
      phone
    }
    comments
  }

  totalAmounts {
    gross
    currencyId
    vats {
      vat
      taxId
    }
  }

  sections {
    id
    customerRemark
    amounts {
      gross
      net
      vats {
        vat
        taxId
      }
      currencyId
    }
    positions {
      id
      quantity
      productItem {
        product {
          id
          product {
            name
          }
        }
      }
      fulfillmentItem {
        product {
          id
          name
        }
      }
      unitPrice {
        salePrice
        regularPrice
        sale
      }
      toDate
      fromDate
    }
  }

  documents {
    id
    url
  }
  meta {
    ...MetaFragment
  }
}
