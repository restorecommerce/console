<div class="p-3">
  <div>
    {{ item.invoiceNumber }}
  </div>

  <!-- Row 2 -->
  <div class="scale85p secondary-text-color mt-1">
    {{ item.recipientName }}
  </div>

  <!-- Row 3 -->
  <div class="scale85p mt-2">
    {{ item.totalAmount | currency: 'EUR' }}
    •
    {{ item.invoiceDate | date }}
  </div>

  <!-- Row 4 -->
  <div class="scale75p mt-1">
    <vcl-badge [type]="getPaymentBadgeType(item.paymentState)"
      >{{ item.paymentState }}
    </vcl-badge>

    @if (item.sent) {
      <span class="mx-2">
        <vcl-badge type="info"> Sent </vcl-badge>
      </span>
    }

    @if (item.withdrawn) {
      <vcl-badge type="error">{{ item.withdrawn }} </vcl-badge>
    }
  </div>
</div>
