<table
  class="table no-border fixed alt-row-color v-align-middle row-hover-highlight row-selectability"
  role="table"
>
  <thead>
    <tr>
      <th class="w-30p">
        <span>Role</span>
      </th>
      <th class="w-20p">
        <span>Scope Type</span>
      </th>
      <th class="w-30p">
        <span>Scope</span>
      </th>
      <th class="w-20p align-centered">
        <span>Source</span>
      </th>
    </tr>
  </thead>

  <tbody>
    @for (assignment of manualAssignments; track assignment.id) {
      <tr>
        <td>
          <div class="fw-500">{{ assignment.roleLabel }}</div>
          <div class="secondary-text-color scale85p">
            {{ assignment.role }}
          </div>
        </td>

        <td>{{ assignment.scopeTypeLabel }}</td>

        <td class="overflow-ellipsis">
          {{ assignment.scopeLabel }}
        </td>

        <td class="align-centered">
          {{ assignment.source === 'manual' ? 'Manual' : 'System' }}
        </td>
      </tr>
    }
  </tbody>
</table>
