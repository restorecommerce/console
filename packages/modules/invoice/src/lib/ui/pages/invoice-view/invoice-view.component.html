@if (invoice(); as invoice) {
  <rc-resource-detail
    [title]="'Invoice details'"
    [showEdit]="true"
    [showDelete]="true"
    (back)="goBack()"
  >
    <div class="mb-2">
      <app-invoice-detail-header [invoice]="invoice" />
    </div>

    <vcl-tab-nav [selectedTabIndex]="0">
      <vcl-tab>
        <vcl-label>Basic</vcl-label>
        <app-invoice-detail-basic [invoice]="invoice" />
      </vcl-tab>

      <vcl-tab>
        <vcl-label>Parties</vcl-label>
        <p>Items</p>
      </vcl-tab>

      <vcl-tab>
        <vcl-label>Items</vcl-label>
        <p>Items</p>
      </vcl-tab>

      <vcl-tab>
        <vcl-label>Documents</vcl-label>
        <p>Documents</p>
      </vcl-tab>

      <vcl-tab>
        <vcl-label>Raw JSON / Meta</vcl-label>

        <div class="raw">
          <div class="secondary-text-color scale85p">Raw payload</div>
          <pre class="pre">{{ invoice | json }}</pre>
        </div>
      </vcl-tab>
    </vcl-tab-nav>
  </rc-resource-detail>
}
